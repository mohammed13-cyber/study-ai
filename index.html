<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanad DZ - Final Version</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { --primary: #6c5ce7; --bg: #f8f9fa; --text: #2d3436; --card-bg: #ffffff; --success: #00b894; --danger: #d63031; }
        [data-theme="dark"] { --bg: #1e1e2e; --text: #fdfdfd; --card-bg: #2d2d44; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; text-align: center; }
        .container { max-width: 500px; margin: auto; padding: 20px; }
        .panel { background: var(--card-bg); padding: 20px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        button { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        #status-msg { margin-top: 15px; font-weight: bold; padding: 10px; border-radius: 8px; }
        .loading { color: orange; }
        .error { color: var(--danger); }
        .flashcard-section { display: none; margin-top: 30px; }
        .card { background: var(--primary); color: white; padding: 40px 20px; border-radius: 20px; cursor: pointer; min-height: 150px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="panel">
        <h2>مرحباً محمد ⚡</h2>
        <p>هذا الكود سيتخطى أخطاء جوجل تلقائياً.</p>
        <textarea id="rawText" style="width:100%; height:100px; border-radius:10px; padding:10px;" placeholder="ضع نص الدرس هنا..."></textarea>
        <button onclick="smartAnalysis()">تحليل النص الآن</button>
        <div id="status-msg"></div>
    </div>

    <div class="flashcard-section" id="resultsArea">
        <div class="card" id="displayCard" onclick="flip()">اضغط لرؤية الجواب</div>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button onclick="prev()" style="background:#ccc; color:#333">السابق</button>
            <button onclick="next()">التالي</button>
        </div>
        <p id="counter"></p>
    </div>
</div>

<script>
    let cards = []; let idx = 0; let isShowingAns = false;
    const API_KEY = "AIzaSyCxcwpjtwk7jJ-jp_sTstP7gTyMMgfmKAo";

    async function smartAnalysis() {
        const text = document.getElementById('rawText').value;
        if(text.length < 5) return alert("اكتب نصاً أولاً");
        
        const prompt = `Convert this text into a JSON array of Q&A in Arabic: [{"question":"...", "answer":"..."}]. Text: ${text}`;
        
        // جرب كل الاحتمالات الممكنة
        const attempts = [
            { ver: 'v1beta', mod: 'gemini-1.5-flash' },
            { ver: 'v1', mod: 'gemini-1.5-flash' },
            { ver: 'v1beta', mod: 'gemini-pro' },
            { ver: 'v1', mod: 'gemini-1.5-flash-latest' }
        ];

        let success = false;
        for(let attempt of attempts) {
            updateStatus(`جاري محاولة الاتصال عبر ${attempt.mod}...`, "loading");
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/${attempt.ver}/models/${attempt.mod}:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await res.json();
                
                if(data.candidates) {
                    let raw = data.candidates[0].content.parts[0].text;
                    const s = raw.indexOf('['); const e = raw.lastIndexOf(']') + 1;
                    cards = JSON.parse(raw.substring(s, e));
                    success = true; break;
                }
            } catch(e) { console.log("فشلت محاولة، ننتقل للتالية..."); }
        }

        if(success) {
            idx = 0; document.getElementById('resultsArea').style.display = 'block';
            show(); updateStatus("نجح الاتصال! ✅", "");
        } else {
            updateStatus("جوجل يرفض المفتاح. تأكد أن الـ API Key مفعل في Google AI Studio.", "error");
        }
    }

    function show() {
        isShowingAns = false;
        document.getElementById('displayCard').innerText = cards[idx].question;
        document.getElementById('displayCard').style.background = "#6c5ce7";
        document.getElementById('counter').innerText = `${idx + 1} / ${cards.length}`;
    }
    function flip() {
        isShowingAns = !isShowingAns;
        document.getElementById('displayCard').innerText = isShowingAns ? cards[idx].answer : cards[idx].question;
        document.getElementById('displayCard').style.background = isShowingAns ? "#00b894" : "#6c5ce7";
    }
    function next() { if(idx < cards.length-1) { idx++; show(); } }
    function prev() { if(idx > 0) { idx--; show(); } }
    function updateStatus(m, c) { const s = document.getElementById('status-msg'); s.innerText = m; s.className = c; }
</script>
</body>
</html>
